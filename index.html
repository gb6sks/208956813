<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Physio-Log</title>
<meta name="robots" content="noindex, nofollow, noarchive" />
<style>
  :root {
    --bg: #182620;
    --surface: #22332B;
    --surface2: #2B3F35;
    --hairline: #3A4F44;
    --text: #F1EDE4;
    --muted: #93A79A;
    --accent: #D9A441;
    --accent-ink: #1B1405;
    --rust: #C1633D;
    --moss: #7FA66B;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); height: 100%; overflow: hidden; overscroll-behavior: none; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; flex-direction: column;
    height: 100vh; height: 100dvh;
  }
  h1, h2, .display { font-family: Georgia, "Times New Roman", serif; }
  header {
    flex-shrink: 0; z-index: 20;
    background: var(--bg);
    border-bottom: 1px solid var(--hairline);
    padding: 18px 16px 14px;
  }
  .header-inner { max-width: 480px; margin: 0 auto; display: flex; align-items: center; gap: 10px; }
  .logo-circle {
    width: 36px; height: 36px; border-radius: 999px; background: var(--surface2);
    color: var(--accent); display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  h1 { font-size: 20px; margin: 0; line-height: 1.2; font-weight: 600; }
  .subtitle { color: var(--muted); font-size: 12px; margin-top: 2px; }
  #scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }
  main { max-width: 480px; margin: 0 auto; padding: 16px; }
  .hidden { display: none !important; }

  .section-label {
    color: var(--muted); font-family: ui-monospace, "SF Mono", Menlo, monospace;
    letter-spacing: 0.06em; font-size: 11px; text-transform: uppercase; margin-bottom: 8px;
  }
  .card {
    background: var(--surface); border: 1px solid var(--hairline); border-radius: 14px; padding: 16px;
  }
  .card.tight { padding: 12px; display: flex; align-items: center; gap: 12px; }

  .choice-btn {
    width: 100%; background: var(--surface); border: 1px solid var(--hairline); border-radius: 14px;
    padding: 16px; display: flex; align-items: center; gap: 14px; text-align: left;
    color: var(--text); font: inherit; margin-bottom: 12px;
  }
  .choice-btn:active { opacity: 0.8; }
  .choice-icon {
    width: 44px; height: 44px; border-radius: 999px; background: var(--surface2); color: var(--accent);
    display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
  }
  .choice-title { font-family: Georgia, serif; font-size: 16px; font-weight: 600; }
  .choice-sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .chevron { color: var(--muted); margin-left: auto; }

  .field { display: block; margin-bottom: 14px; }
  .field-label { color: var(--muted); font-size: 12px; margin-bottom: 6px; display: block; }
  input, select, textarea {
    background: var(--surface2); border: 1px solid var(--hairline); color: var(--text);
    border-radius: 10px; padding: 10px 12px; width: 100%; font: inherit; font-size: 14px;
  }
  textarea { min-height: 64px; resize: vertical; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .btn-primary {
    width: 100%; background: var(--accent); color: var(--accent-ink); border: none;
    padding: 13px; border-radius: 12px; font-weight: 600; font-size: 15px; margin-top: 6px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-primary:disabled { background: var(--hairline); color: var(--muted); }
  .btn-secondary {
    flex: 1; background: var(--surface); border: 1px solid var(--hairline); color: var(--text);
    padding: 11px; border-radius: 10px; font-weight: 500; font-size: 14px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .form-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .icon-btn { background: none; border: none; color: var(--muted); font-size: 18px; padding: 4px; }

  nav.bottom {
    flex-shrink: 0; z-index: 20;
    background: var(--surface); border-top: 1px solid var(--hairline);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-inner { max-width: 480px; margin: 0 auto; display: grid; grid-template-columns: repeat(5,1fr); }
  .nav-btn {
    background: none; border: none; color: var(--muted); padding: 10px 0 8px;
    display: flex; flex-direction: column; align-items: center; gap: 4px; font: inherit;
  }
  .nav-btn.active { color: var(--accent); font-weight: 600; }
  .nav-icon { font-size: 18px; }
  .nav-label { font-size: 10px; }

  .filter-row { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 16px; padding-bottom: 2px; }
  .stats-filter-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .stats-filter-select {
    flex: 1 1 46%; min-width: 140px; background: var(--surface2); border: 1px solid var(--hairline);
    color: var(--text); border-radius: 10px; padding: 8px 10px; font-size: 12px; font-family: inherit;
  }
  .filter-chip {
    background: var(--surface); border: 1px solid var(--hairline); color: var(--muted);
    padding: 7px 14px; border-radius: 999px; font-size: 12px; font-weight: 500; white-space: nowrap;
  }
  .filter-chip.active { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }

  .session-row-icon {
    width: 36px; height: 36px; border-radius: 999px; background: var(--surface2); color: var(--accent);
    display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;
  }
  .session-title { font-size: 14px; font-weight: 500; }
  .session-sub { color: var(--muted); font-size: 11px; margin-top: 2px; font-family: ui-monospace, monospace; }
  .session-notes { color: var(--muted); font-size: 12px; margin-top: 4px; font-style: italic; }
  .delete-btn { margin-left: auto; background: none; border: none; color: var(--muted); font-size: 15px; flex-shrink: 0; padding: 4px; }

  .empty-state { text-align: center; padding: 40px 16px; }
  .empty-state .icon { font-size: 24px; color: var(--muted); margin-bottom: 10px; }
  .empty-state p { color: var(--muted); font-size: 14px; margin: 0; }

  .gap-badge {
    font-family: ui-monospace, monospace; font-size: 12px; padding: 4px 9px; border-radius: 999px;
    background: var(--surface2); flex-shrink: 0;
  }

  .info-box { background: var(--surface2); display: flex; gap: 10px; align-items: flex-start; }
  .info-box p { margin: 0; font-size: 12px; color: var(--muted); }

  .export-row { display: flex; gap: 8px; }
  .storage-note {
    color: var(--muted); font-size: 11px; margin-top: 10px; line-height: 1.5;
  }
  #toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: var(--surface2); color: var(--text); padding: 10px 18px; border-radius: 999px;
    font-size: 13px; border: 1px solid var(--hairline); z-index: 50; opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  #toast.show { opacity: 1; }
  #text-modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 100; align-items: center; justify-content: center; padding: 20px;
  }
  .text-modal {
    background: var(--surface); border: 1px solid var(--hairline); border-radius: 14px;
    padding: 16px; width: 100%; max-width: 480px; max-height: 80vh; display: flex; flex-direction: column;
  }
  #text-modal-content {
    flex: 1; min-height: 220px; font-family: ui-monospace, monospace; font-size: 11px;
    background: var(--surface2); color: var(--text); border: 1px solid var(--hairline);
    border-radius: 8px; padding: 10px; resize: none;
  }
  .cal-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
  }
  .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
  }
  .cal-grid-header { margin-bottom: 4px; }
  .cal-weekday {
    text-align: center; color: var(--muted); font-size: 11px; font-family: ui-monospace, monospace;
  }
  .cal-cell {
    aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    border-radius: 8px; background: none; border: 1px solid transparent; color: var(--text);
    font: inherit; position: relative; gap: 2px;
  }
  .cal-cell.empty { visibility: hidden; }
  .cal-daynum { font-size: 12px; }
  .cal-cell.has-entries { background: var(--surface2); border-color: var(--hairline); }
  .cal-cell.has-entries .cal-daynum { font-weight: 600; color: var(--accent); }
  .cal-cell.is-today { border-color: var(--accent); }
  .cal-dot {
    font-size: 9px; font-family: ui-monospace, monospace; color: var(--accent-ink);
    background: var(--accent); border-radius: 999px; min-width: 14px; padding: 0 3px; line-height: 14px;
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-circle">🐾</div>
    <div id="title-container" style="display:flex;align-items:center;gap:6px;min-width:0;flex:1;"></div>
    <button class="icon-btn" id="open-admin-modal" style="font-size:18px;flex-shrink:0;" title="Hunde &amp; Datenverwaltung">⚙️</button>
  </div>
</header>

<div id="scroll-area">
  <main id="main"></main>
</div>

<nav class="bottom">
  <div class="nav-inner">
    <button class="nav-btn" data-tab="log"><span class="nav-icon">➕</span><span class="nav-label">Eintragen</span></button>
    <button class="nav-btn" data-tab="history"><span class="nav-icon">📅</span><span class="nav-label">Verlauf</span></button>
    <button class="nav-btn" data-tab="stats"><span class="nav-icon">📊</span><span class="nav-label">Statistik</span></button>
    <button class="nav-btn" data-tab="suggest"><span class="nav-icon">📈</span><span class="nav-label">Vorschläge</span></button>
    <button class="nav-btn" data-tab="library"><span class="nav-icon">📋</span><span class="nav-label">Übungen</span></button>
  </div>
</nav>

<div id="toast"></div>
<div id="text-modal-overlay"></div>

<script>
(function () {
  "use strict";

  var STORAGE_KEY = "zazuPhysioData"; // interner Speicherschlüssel, bewusst unverändert gelassen, damit bestehende Daten nicht verloren gehen
  var CATEGORIES = ["Balance","Mobility"];
  var SOURCES = ["Physiotherapeut:in","Gekaufter Plan","Eigene Idee","Sonstiges"];
  var DIFFICULTIES = ["Beginner","Intermediate","Pro"];

  // Einfache, dauer-basierte Aktivitätstypen (eigener Button auf dem Eintragen-Screen, kein freies Textfeld).
  // "jog" bleibt als type-Wert bestehen, damit bereits gespeicherte Einträge weiter korrekt zugeordnet werden.
  var SIMPLE_TYPES = [
    { type: "jog", label: "Joggen & Radfahren", icon: "🏃", sub: "gemeinsame Lauf- oder Radeinheit", formTitle: "Lauf-/Radeinheit", hasDistance: true },
    { type: "physio", label: "Physiotherapie", icon: "🧑‍⚕️", sub: "Physiotherapie-Behandlung", formTitle: "Physiotherapie-Einheit", hasDistance: false },
    { type: "swim", label: "Schwimmen", icon: "🏊", sub: "Schwimmeinheit", formTitle: "Schwimmeinheit", hasDistance: true },
    { type: "underwater", label: "Unterwasserlaufband", icon: "🌊", sub: "Unterwasserlaufband-Einheit", formTitle: "Unterwasserlaufband-Einheit", hasDistance: false }
  ];
  function simpleTypeConfig(type) {
    return SIMPLE_TYPES.find(function (t) { return t.type === type; }) || null;
  }

  function uid() { return Math.random().toString(36).slice(2, 10); }
  function todayISO() { return new Date().toISOString().slice(0, 10); }
  function fmtDate(d) {
    var dt = new Date(d + "T00:00:00");
    return dt.toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit", year: "numeric" });
  }
  function daysSince(d) {
    if (!d) return null;
    var dt = new Date(d + "T00:00:00");
    var now = new Date(); now.setHours(0,0,0,0);
    return Math.round((now - dt) / 86400000);
  }
  function esc(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  // ---- Farbschema: Nutzer wählt eine Hintergrundfarbe, alle anderen Töne werden automatisch dazu berechnet ----
  var DEFAULT_BG = "#182620";
  function hexToRgb(hex) {
    var h = hex.replace("#", "");
    if (h.length === 3) h = h.split("").map(function (c) { return c + c; }).join("");
    var num = parseInt(h, 16);
    return { r: (num >> 16) & 255, g: (num >> 8) & 255, b: num & 255 };
  }
  function rgbToHex(r, g, b) {
    return "#" + [r, g, b].map(function (v) {
      return Math.max(0, Math.min(255, Math.round(v))).toString(16).padStart(2, "0");
    }).join("");
  }
  function mixColor(hex, targetHex, amount) {
    var a = hexToRgb(hex), b = hexToRgb(targetHex);
    return rgbToHex(a.r + (b.r - a.r) * amount, a.g + (b.g - a.g) * amount, a.b + (b.b - a.b) * amount);
  }
  function relativeLuminance(hex) {
    var rgb = hexToRgb(hex);
    var vals = [rgb.r, rgb.g, rgb.b].map(function (v) {
      v = v / 255;
      return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
    });
    return 0.2126 * vals[0] + 0.7152 * vals[1] + 0.0722 * vals[2];
  }
  function applyBgColor(hex) {
    var isDark = relativeLuminance(hex) < 0.5;
    var mixTarget = isDark ? "#FFFFFF" : "#000000";
    var text = isDark ? "#F1EDE4" : "#241C10";
    var muted = isDark ? "#93A79A" : "#6B5D4F";
    var surface = mixColor(hex, mixTarget, 0.09);
    var surface2 = mixColor(hex, mixTarget, 0.17);
    var hairline = mixColor(hex, mixTarget, 0.28);
    var root = document.documentElement.style;
    root.setProperty("--bg", hex);
    root.setProperty("--surface", surface);
    root.setProperty("--surface2", surface2);
    root.setProperty("--hairline", hairline);
    root.setProperty("--text", text);
    root.setProperty("--muted", muted);
  }

  function multiDog() {
    return state.dogs && state.dogs.length >= 2;
  }
  function dogName(dogId) {
    var d = state.dogs.find(function (x) { return x.id === dogId; });
    return d ? d.name : null;
  }
  function dogFilterSessions(sessions) {
    if (!multiDog() || activeDogFilter === "all") return sessions;
    return sessions.filter(function (s) { return s.dogId === activeDogFilter; });
  }
  function matchesHistoryFilter(s) {
    if (historyFilter === "all") return true;
    if (historyFilter.indexOf("custom:") === 0) {
      return s.type === "custom" && s.activityName === historyFilter.slice(7);
    }
    return s.type === historyFilter;
  }
  function historyTypeChipsHTML() {
    var usedActivities = Array.from(new Set(
      state.sessions.filter(function (s) { return s.type === "custom" && s.activityName; }).map(function (s) { return s.activityName; })
    )).sort();
    var options = [["all","Alle"],["exercise","Übungen"],["novafon","Novafon"]];
    SIMPLE_TYPES.forEach(function (cfg) {
      var used = state.sessions.some(function (s) { return s.type === cfg.type; });
      if (used || historyFilter === cfg.type) options.push([cfg.type, cfg.label]);
    });
    options = options.concat(usedActivities.map(function (a) { return ["custom:" + a, a]; }));
    if (!usedActivities.length) options.push(["custom","Sonstiges"]); // noch keine benannten Aktivitäten -> generischer Chip als Fallback
    return options.map(function (c) {
      return '<button class="filter-chip' + (historyFilter === c[0] ? " active" : "") + '" data-filter="' + esc(c[0]) + '">' + esc(c[1]) + "</button>";
    }).join("");
  }
  function dogFilterChipsHTML() {
    if (!multiDog()) return "";
    var chips = [['all', 'Alle Hunde']].concat(state.dogs.map(function (d) { return [d.id, d.name]; }));
    return '<div class="filter-row">' + chips.map(function (c) {
      return '<button class="filter-chip' + (activeDogFilter === c[0] ? " active" : "") + '" data-dog-filter="' + c[0] + '">' + esc(c[1]) + "</button>";
    }).join("") + "</div>";
  }
  function dogFilterSelectHTML(selectId) {
    if (!multiDog()) return "";
    var opts = '<option value="all"' + (activeDogFilter === "all" ? " selected" : "") + '>🐾 Alle Hunde</option>' +
      state.dogs.map(function (d) {
        return '<option value="' + d.id + '"' + (activeDogFilter === d.id ? " selected" : "") + '>🐾 ' + esc(d.name) + "</option>";
      }).join("");
    return '<select id="' + selectId + '" class="stats-filter-select dog-filter-select">' + opts + "</select>";
  }

  var DEFAULT_DATA = {
    appName: "Physio-Log",
    dogs: [],
    exercises: [],
    sessions: []
  };

  function loadData() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        var parsed = JSON.parse(raw);
        if (!parsed.dogs) parsed.dogs = []; // ältere Backups kannten noch keine Hunde
        return parsed;
      }
    } catch (e) {
      // Speicher nicht verfügbar/leer -> mit Standarddaten starten
    }
    return JSON.parse(JSON.stringify(DEFAULT_DATA));
  }
  function saveData() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    catch (e) { toast("Speichern fehlgeschlagen — Speicher ggf. voll oder blockiert."); }
  }

  var state = loadData();
  var currentTab = "log";
  var logMode = null; // null | 'exercise' | 'novafon' | 'jog'
  var logPreselectId = null; // beim Sprung von "Vorschläge" -> vorausgewählte Übung im Eintragen-Formular
  var historyFilter = "all";
  var historyView = "calendar"; // "list" | "calendar"
  var calendarMonth = todayISO().slice(0, 7); // "YYYY-MM"
  var calendarSelectedDay = null; // "YYYY-MM-DD" oder null
  var statsPeriod = "30";
  var statsCustomFrom = "";
  var statsCustomTo = "";
  var statsGroupBy = "none"; // "none" | "category" | "difficulty"
  var statsSortOrder = "desc"; // "desc" = häufigste zuerst, "asc" = seltenste zuerst
  var libraryFormOpen = false;
  var libraryEditingId = null; // null = "neue Übung anlegen", sonst id der zu bearbeitenden Übung
  var expandedCategories = {}; // { "Kategoriename": true } — welche Kategorien in der Übungsliste aufgeklappt sind
  var dogFormOpen = false;
  var dogEditingId = null;
  var activeDogFilter = "all"; // "all" oder eine dogId — nur relevant, wenn 2+ Hunde existieren

  function toast(msg) {
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(function(){ t.classList.remove("show"); }, 2200);
  }

  function buildCSV() {
    var header = ["Datum","Hund","Typ","Übung/Bereich","Kategorie","Schwierigkeitsgrad","Wiederholungen","Dauer (Min.)","Distanz (km)","Notizen"];
    var rows = state.sessions.map(function (s) {
      var dn = s.dogId ? (dogName(s.dogId) || "") : "";
      if (s.type === "exercise") return [s.date, dn, "Übung", s.exerciseName, s.category, s.difficulty || "", s.reps == null ? "" : s.reps, "", "", s.notes || ""];
      if (s.type === "novafon") return [s.date, dn, "Novafon", s.area, "", "", "", s.duration, "", s.notes || ""];
      var simpleCfg = simpleTypeConfig(s.type);
      if (simpleCfg) return [s.date, dn, simpleCfg.label, "", "", "", "", s.duration, s.distance == null ? "" : s.distance, s.notes || ""];
      return [s.date, dn, "Sonstige Aktivität", s.activityName, "", "", "", s.duration == null ? "" : s.duration, "", s.notes || ""];
    });
    function q(v) { return '"' + String(v).replace(/"/g, '""') + '"'; }
    return [header].concat(rows).map(function(r){ return r.map(q).join(";"); }).join("\n");
  }

  function showTextModal(title, content) {
    var overlay = document.getElementById("text-modal-overlay");
    overlay.innerHTML =
      '<div class="text-modal">' +
      '<div class="form-header"><span class="display" style="font-weight:600;">' + esc(title) + '</span><button class="icon-btn" id="close-text-modal-x">✕</button></div>' +
      '<textarea id="text-modal-content" readonly></textarea>' +
      '<p style="color:var(--muted);font-size:12px;margin:10px 0;">Tippe ins Feld, halte kurz gedrückt und wähle „Alles auswählen", dann „Kopieren". Füge den Text danach z. B. in die Notizen-App ein und hebe ihn dort auf.</p>' +
      '<button class="btn-primary" id="close-text-modal-btn">Fertig</button>' +
      "</div>";
    overlay.style.display = "flex";
    var ta = document.getElementById("text-modal-content");
    ta.value = content;
    ta.focus();
    ta.select();
    function close() { overlay.style.display = "none"; overlay.innerHTML = ""; overlay.dataset.mode = ""; }
    document.getElementById("close-text-modal-x").addEventListener("click", close);
    document.getElementById("close-text-modal-btn").addEventListener("click", close);
  }

  function showImportModal() {
    var overlay = document.getElementById("text-modal-overlay");
    overlay.innerHTML =
      '<div class="text-modal">' +
      '<div class="form-header"><span class="display" style="font-weight:600;">Backup einfügen</span><button class="icon-btn" id="close-import-modal-x">✕</button></div>' +
      '<textarea id="import-modal-content" placeholder="JSON-Backup hier einfügen (z. B. aus der Notizen-App kopiert)"></textarea>' +
      '<button class="btn-primary" id="import-modal-submit" style="margin-top:10px;">Importieren (ersetzt aktuelle Daten)</button>' +
      "</div>";
    overlay.style.display = "flex";
    var ta = document.getElementById("import-modal-content");
    ta.focus();
    function close() { overlay.style.display = "none"; overlay.innerHTML = ""; overlay.dataset.mode = ""; }
    document.getElementById("close-import-modal-x").addEventListener("click", close);
    document.getElementById("import-modal-submit").addEventListener("click", async function () {
      try {
        var parsed = JSON.parse(ta.value);
        if (!parsed.exercises || !parsed.sessions) throw new Error("Ungültiges Format");
        if (!parsed.dogs) parsed.dogs = [];
        state = parsed;
        await saveData();
        close();
        toast("Backup importiert — vorherige Daten wurden ersetzt");
        render();
      } catch (e) {
        toast("Import fehlgeschlagen: Text ist kein gültiges Backup");
      }
    });
  }

  function shouldShowBackupReminder() {
    if (!state.exercises.length && !state.sessions.length) return false; // noch nichts zu sichern
    var lastBackup = state.lastBackupAt || null;
    var lastDismiss = state.backupReminderDismissedAt || null;
    var mostRecent = null;
    if (lastBackup && lastDismiss) mostRecent = lastBackup > lastDismiss ? lastBackup : lastDismiss;
    else mostRecent = lastBackup || lastDismiss || null;
    if (!mostRecent) return true; // noch nie gesichert und noch nie weggeklickt
    return daysSince(mostRecent) >= 14;
  }

  function showBackupReminderModal() {
    var overlay = document.getElementById("text-modal-overlay");
    overlay.dataset.mode = "backup-reminder";
    var lastText = state.lastBackupAt
      ? "Dein letztes Backup ist " + daysSince(state.lastBackupAt) + " Tage her."
      : "Du hast bisher noch kein Backup gemacht.";
    overlay.innerHTML =
      '<div class="text-modal" style="max-height:none;">' +
      '<div class="form-header"><span class="display" style="font-weight:600;">💾 Backup-Erinnerung</span></div>' +
      '<p style="color:var(--text);font-size:14px;line-height:1.5;margin:0 0 16px;">' + esc(lastText) + " Möchtest du jetzt eins machen?</p>" +
      '<div style="display:flex;gap:8px;">' +
      '<button class="btn-secondary" id="backup-reminder-later" style="flex:1;">Später</button>' +
      '<button class="btn-primary" id="backup-reminder-now" style="flex:1;margin-top:0;">Jetzt sichern</button>' +
      "</div></div>";
    overlay.style.display = "flex";
    function dismiss() {
      state.backupReminderDismissedAt = todayISO();
      saveData();
      overlay.style.display = "none";
      overlay.innerHTML = "";
      overlay.dataset.mode = "";
    }
    document.getElementById("backup-reminder-later").addEventListener("click", dismiss);
    document.getElementById("backup-reminder-now").addEventListener("click", function () {
      state.lastBackupAt = todayISO();
      state.backupReminderDismissedAt = todayISO();
      saveData();
      showTextModal("JSON-Backup", JSON.stringify(state, null, 2));
    });
  }

  function importJSON(file) {
    var reader = new FileReader();
    reader.onload = async function () {
      try {
        var parsed = JSON.parse(reader.result);
        if (!parsed.exercises || !parsed.sessions) throw new Error("Ungültiges Format");
        if (!parsed.dogs) parsed.dogs = [];
        state = parsed;
        await saveData();
        toast("Backup importiert — vorherige Daten wurden ersetzt");
        render();
      } catch (e) {
        toast("Import fehlgeschlagen: Datei ungültig");
      }
    };
    reader.readAsText(file);
  }

  // ---------- rendering ----------
  function render() {
    var main = document.getElementById("main");
    if (currentTab === "log") main.innerHTML = renderLog();
    else if (currentTab === "history") main.innerHTML = renderHistory();
    else if (currentTab === "stats") main.innerHTML = renderStats();
    else if (currentTab === "suggest") main.innerHTML = renderSuggest();
    else main.innerHTML = renderLibrary();

    document.querySelectorAll(".nav-btn").forEach(function (btn) {
      btn.classList.toggle("active", btn.dataset.tab === currentTab);
    });
    attachHandlers();
  }

  function renderLog() {
    if (logMode === null) {
      var choiceMeta = {
        exercise: { icon: "🏋️", title: "Übungseinheit", sub: "aus deiner Übungsbibliothek" },
        novafon: { icon: "〰️", title: "Novafon", sub: "Vibrationstherapie-Einheit" },
        custom: { icon: "✨", title: "Sonstige Aktivität", sub: "frei benennen, für alles, was hier noch nicht passt" }
      };
      var order = ["exercise", "swim", "jog", "novafon", "custom", "physio", "underwater"];
      var buttons = order.map(function (type) {
        var m = choiceMeta[type];
        if (!m) {
          var cfg = simpleTypeConfig(type);
          if (!cfg) return "";
          m = { icon: cfg.icon, title: cfg.label, sub: cfg.sub };
        }
        return '<button class="choice-btn" data-mode="' + type + '"><div class="choice-icon">' + m.icon + '</div>' +
          '<div><div class="choice-title">' + esc(m.title) + '</div><div class="choice-sub">' + esc(m.sub) + '</div></div>' +
          '<div class="chevron">›</div></button>';
      }).join("");
      return '<div class="section-label">Was möchtest du eintragen?</div>' + buttons;
    }
    if (logMode === "exercise") return renderExerciseForm();
    if (logMode === "novafon") return renderNovafonForm();
    if (logMode === "custom") return renderCustomForm();
    var cfg = simpleTypeConfig(logMode);
    if (cfg) return renderSimpleActivityForm(cfg);
    return renderCustomForm();
  }

  function renderHistory() {
    var viewOptions =
      '<option value="list"' + (historyView === "list" ? " selected" : "") + '>☰ Liste</option>' +
      '<option value="calendar"' + (historyView === "calendar" ? " selected" : "") + '>📅 Kalender</option>';
    var viewToggle =
      '<div class="stats-filter-row">' +
      '<select id="history-view-select" class="stats-filter-select">' + viewOptions + "</select>" +
      dogFilterSelectHTML("history-dog-select") +
      "</div>";

    var typeChips = historyTypeChipsHTML();

    if (historyView === "calendar") return viewToggle + '<div class="filter-row">' + typeChips + '</div>' + renderCalendarView();

    var filtered = dogFilterSessions(state.sessions).filter(matchesHistoryFilter);
    var groups = {};
    filtered.forEach(function (s) { (groups[s.date] = groups[s.date] || []).push(s); });
    var dates = Object.keys(groups).sort().reverse();

    if (!dates.length) {
      return viewToggle + '<div class="filter-row">' + typeChips + '</div>' +
        '<div class="card empty-state"><div class="icon">🐾</div><p>Noch keine Einträge. Leg unter „Eintragen“ los.</p></div>';
    }

    var body = dates.map(function (date) {
      var rows = groups[date].map(sessionRowHTML).join("");
      return '<div style="margin-bottom:20px;"><div class="section-label">' + fmtDate(date) + '</div>' +
        '<div style="display:flex;flex-direction:column;gap:8px;">' + rows + '</div></div>';
    }).join("");

    return viewToggle + '<div class="filter-row">' + typeChips + '</div>' + body;
  }

  var WEEKDAY_LABELS = ["Mo","Di","Mi","Do","Fr","Sa","So"];
  var MONTH_LABELS = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];

  function renderCalendarView() {
    if (calendarSelectedDay) return renderCalendarDayDetail();

    var parts = calendarMonth.split("-");
    var year = Number(parts[0]), month = Number(parts[1]) - 1; // 0-indexed

    var countsByDate = {};
    dogFilterSessions(state.sessions).forEach(function (s) {
      if (s.date.slice(0, 7) !== calendarMonth) return;
      if (!matchesHistoryFilter(s)) return;
      countsByDate[s.date] = (countsByDate[s.date] || 0) + 1;
    });

    var firstWeekday = (new Date(year, month, 1).getDay() + 6) % 7; // 0 = Montag
    var daysInMonth = new Date(year, month + 1, 0).getDate();
    var today = todayISO();

    var cells = "";
    for (var i = 0; i < firstWeekday; i++) cells += '<div class="cal-cell empty"></div>';
    for (var d = 1; d <= daysInMonth; d++) {
      var dateStr = calendarMonth + "-" + String(d).padStart(2, "0");
      var count = countsByDate[dateStr] || 0;
      var classes = "cal-cell" + (count > 0 ? " has-entries" : "") + (dateStr === today ? " is-today" : "");
      cells +=
        '<button class="' + classes + '" data-cal-day="' + dateStr + '">' +
        '<span class="cal-daynum">' + d + "</span>" +
        (count > 0 ? '<span class="cal-dot">' + (count > 9 ? "9+" : count) + "</span>" : "") +
        "</button>";
    }

    var weekdayHeader = WEEKDAY_LABELS.map(function (w) { return '<div class="cal-weekday">' + w + "</div>"; }).join("");
    var monthLabel = MONTH_LABELS[month] + " " + year;

    return (
      '<div class="cal-header">' +
      '<button class="icon-btn" data-cal-nav="prev" style="font-size:18px;">‹</button>' +
      '<span class="display" style="font-weight:600;font-size:16px;">' + monthLabel + "</span>" +
      '<button class="icon-btn" data-cal-nav="next" style="font-size:18px;">›</button>' +
      "</div>" +
      '<div class="cal-grid cal-grid-header">' + weekdayHeader + "</div>" +
      '<div class="cal-grid">' + cells + "</div>" +
      '<p style="color:var(--muted);font-size:11px;margin-top:12px;">Tage mit Einträgen sind hervorgehoben, die Zahl zeigt die Anzahl der Einheiten. Antippen zeigt die Details.</p>'
    );
  }

  function renderCalendarDayDetail() {
    var dayEntries = dogFilterSessions(state.sessions).filter(function (s) {
      return s.date === calendarSelectedDay && matchesHistoryFilter(s);
    });
    var rows = dayEntries.length
      ? dayEntries.map(sessionRowHTML).join("")
      : '<div class="card empty-state"><p>Keine Einträge an diesem Tag.</p></div>';
    return (
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">' +
      '<button class="icon-btn" id="cal-back-btn" style="font-size:16px;">‹ Kalender</button>' +
      "</div>" +
      '<div class="section-label">' + fmtDate(calendarSelectedDay) + '</div>' +
      '<div style="display:flex;flex-direction:column;gap:8px;">' + rows + "</div>"
    );
  }

  function sessionRowHTML(s) {
    var icon, title, sub;
    var simpleCfg = simpleTypeConfig(s.type);
    if (s.type === "exercise") { icon = "🏋️"; title = esc(s.exerciseName); sub = esc(s.category) + (s.reps != null ? " · " + s.reps + " Wdh." : ""); }
    else if (s.type === "novafon") { icon = "〰️"; title = "Novafon"; sub = esc(s.area) + " · " + s.duration + " Min."; }
    else if (simpleCfg) { icon = simpleCfg.icon; title = esc(simpleCfg.label); sub = s.duration + " Min." + (s.distance ? " · " + s.distance + " km" : ""); }
    else { icon = "✨"; title = esc(s.activityName); sub = s.duration != null ? s.duration + " Min." : ""; }
    var notes = s.notes ? '<div class="session-notes">' + esc(s.notes) + "</div>" : "";
    var dogBadge = "";
    if (multiDog() && s.dogId) {
      var dn = dogName(s.dogId);
      if (dn) dogBadge = '<span class="gap-badge" style="color:var(--accent);flex-shrink:0;">' + esc(dn) + "</span>";
    }
    return (
      '<div class="card tight"><div class="session-row-icon">' + icon + "</div>" +
      '<div style="flex:1;min-width:0;"><div class="session-title">' + title + "</div>" +
      (sub ? '<div class="session-sub">' + sub + "</div>" : "") + notes + "</div>" +
      dogBadge +
      '<button class="delete-btn" data-delete="' + s.id + '">🗑</button></div>'
    );
  }

  function renderStats() {
    var periods = [["7","📅 7 Tage"],["30","📅 30 Tage"],["365","📅 Jahr"],["all","📅 Gesamt"],["custom","📅 Zeitraum wählen"]];
    var periodOptions = periods.map(function (p) {
      return '<option value="' + p[0] + '"' + (statsPeriod === p[0] ? " selected" : "") + '>' + p[1] + "</option>";
    }).join("");

    var customRangeHTML = "";
    if (statsPeriod === "custom") {
      customRangeHTML =
        '<div class="row2" style="margin-bottom:12px;">' +
        '<label class="field" style="margin-bottom:0;"><span class="field-label">Von</span><input type="date" id="stats-from" value="' + statsCustomFrom + '" /></label>' +
        '<label class="field" style="margin-bottom:0;"><span class="field-label">Bis</span><input type="date" id="stats-to" value="' + statsCustomTo + '" /></label>' +
        "</div>";
    }

    var sessions = dogFilterSessions(state.sessions).filter(function (s) { return s.type === "exercise"; });
    var periodLabel;
    if (statsPeriod === "all") {
      periodLabel = "gesamten Zeitraum";
    } else if (statsPeriod === "custom") {
      if (statsCustomFrom) sessions = sessions.filter(function (s) { return s.date >= statsCustomFrom; });
      if (statsCustomTo) sessions = sessions.filter(function (s) { return s.date <= statsCustomTo; });
      periodLabel = (statsCustomFrom ? fmtDate(statsCustomFrom) : "Anfang") + " – " + (statsCustomTo ? fmtDate(statsCustomTo) : "heute");
    } else {
      var cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - Number(statsPeriod));
      var cutoffStr = cutoff.toISOString().slice(0, 10);
      sessions = sessions.filter(function (s) { return s.date >= cutoffStr; });
      periodLabel = statsPeriod === "7" ? "letzten 7 Tage" : statsPeriod === "30" ? "letzten 30 Tage" : "letzten 365 Tage";
    }

    var groupOptions = [["none","🗂 Nicht gruppiert"],["category","🗂 Nach Kategorie"],["difficulty","🗂 Nach Schwierigkeitsgrad"]];
    var groupSelectOptions = groupOptions.map(function (g) {
      return '<option value="' + g[0] + '"' + (statsGroupBy === g[0] ? " selected" : "") + '>' + g[1] + "</option>";
    }).join("");
    var sortSelectOptions =
      '<option value="desc"' + (statsSortOrder === "desc" ? " selected" : "") + '>↕ Häufigste zuerst</option>' +
      '<option value="asc"' + (statsSortOrder === "asc" ? " selected" : "") + '>↕ Seltenste zuerst</option>';

    var filterControlsHTML =
      '<div class="stats-filter-row">' +
      dogFilterSelectHTML("stats-dog-select") +
      '<select id="stats-period-select" class="stats-filter-select">' + periodOptions + "</select>" +
      '<select id="stats-groupby-select" class="stats-filter-select">' + groupSelectOptions + "</select>" +
      '<select id="stats-sortorder-select" class="stats-filter-select">' + sortSelectOptions + "</select>" +
      "</div>" +
      customRangeHTML;

    // build rows: one per exercise (deduped by name), one per category, or one per difficulty level
    var byGroup = {};
    sessions.forEach(function (s) {
      var key, label;
      if (statsGroupBy === "category") {
        key = s.category;
        label = s.category;
      } else if (statsGroupBy === "difficulty") {
        key = s.difficulty || "Beginner";
        label = s.difficulty || "Beginner";
      } else {
        key = s.exerciseName.trim().toLowerCase();
        label = s.exerciseName;
      }
      if (!byGroup[key]) byGroup[key] = { name: label, category: s.category, difficulty: s.difficulty || "Beginner", count: 0, reps: 0 };
      byGroup[key].count += 1;
      byGroup[key].reps += (s.reps || 0);
    });
    var list = Object.keys(byGroup).map(function (k) { return byGroup[k]; })
      .sort(function (a, b) { return statsSortOrder === "asc" ? a.count - b.count : b.count - a.count; });
    var maxCount = list.length ? Math.max.apply(null, list.map(function (i) { return i.count; })) : 0;

    var body;
    if (!list.length) {
      body = '<div class="card empty-state"><div class="icon">📊</div><p>Für den gewählten Zeitraum (' + periodLabel + ') liegen keine passenden Übungseinträge vor.</p></div>';
    } else {
      var totalSessions = sessions.length;
      var rows = list.map(function (item) {
        var pct = maxCount ? Math.round((item.count / maxCount) * 100) : 0;
        var subline;
        if (statsGroupBy === "none") subline = esc(item.category) + " · " + esc(item.difficulty) + " · " + item.reps + " Wdh. insgesamt";
        else subline = item.reps + " Wdh. insgesamt";
        return (
          '<div class="card" style="margin-bottom:10px;padding:12px 14px;">' +
          '<div style="display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:6px;">' +
          '<span class="session-title" style="min-width:0;">' + esc(item.name) + '</span>' +
          '<span style="font-family:ui-monospace,monospace;font-size:13px;color:var(--accent);flex-shrink:0;">' + item.count + "×</span>" +
          "</div>" +
          '<div style="background:var(--hairline);border-radius:999px;height:8px;overflow:hidden;">' +
          '<div style="width:' + pct + '%;height:100%;background:var(--accent);"></div>' +
          "</div>" +
          '<div style="color:var(--muted);font-size:11px;margin-top:6px;">' + subline + "</div>" +
          "</div>"
        );
      }).join("");
      var groupNoteMap = { none: ", jede Übung erscheint einmal", category: ", gruppiert nach Kategorie", difficulty: ", gruppiert nach Schwierigkeitsgrad" };
      body = (
        '<div style="color:var(--muted);font-size:12px;margin-bottom:14px;">' + totalSessions + " Übungseinheiten im gewählten Zeitraum (" + periodLabel + "), sortiert nach Häufigkeit" + groupNoteMap[statsGroupBy] + ".</div>" +
        rows
      );
    }

    return filterControlsHTML + body;
  }

  function renderSuggest() {
    if (!state.exercises.length) {
      return '<div class="card empty-state"><div class="icon">💡</div><p>Leg zuerst unter „Übungen" ein paar Übungen an, dann kann ich dir hier Vorschläge machen.</p></div>';
    }

    var dogChips = dogFilterChipsHTML();
    if (multiDog() && activeDogFilter === "all") {
      return dogChips + '<div class="card empty-state"><div class="icon">💡</div><p>Wähle oben einen Hund aus, um passende Vorschläge zu sehen — Vorschläge beziehen sich immer auf einen einzelnen Hund.</p></div>';
    }

    var relevantSessions = dogFilterSessions(state.sessions);

    var lastByExercise = {};
    relevantSessions.filter(function (s) { return s.type === "exercise"; }).forEach(function (s) {
      if (!lastByExercise[s.exerciseId] || s.date > lastByExercise[s.exerciseId]) lastByExercise[s.exerciseId] = s.date;
    });

    // Lücke pro Übung: null = noch nie gemacht (höchste Priorität), sonst Tage seit letztem Mal
    var withGap = state.exercises.map(function (e) {
      var last = lastByExercise[e.id] || null;
      return { ex: e, last: last, gap: last ? daysSince(last) : null };
    });

    // Für Abwechslung: pro Kategorie die Übung mit der größten Lücke auswählen (statt immer dieselbe Kategorie mehrfach vorzuschlagen)
    var byCategory = {};
    withGap.forEach(function (item) {
      var cat = item.ex.category;
      if (!byCategory[cat]) byCategory[cat] = item;
      else {
        var current = byCategory[cat];
        var currentIsWorse = (item.gap === null && current.gap !== null) || (item.gap !== null && current.gap !== null && item.gap > current.gap);
        if (currentIsWorse) byCategory[cat] = item;
      }
    });
    var picks = Object.keys(byCategory).map(function (k) { return byCategory[k]; })
      .sort(function (a, b) {
        if (a.gap === null && b.gap === null) return 0;
        if (a.gap === null) return -1;
        if (b.gap === null) return 1;
        return b.gap - a.gap;
      })
      .slice(0, 5);

    var suggestionCards = picks.map(function (item) {
      var badgeColor = item.gap === null ? "var(--rust)" : item.gap >= 7 ? "var(--rust)" : item.gap >= 3 ? "var(--accent)" : "var(--moss)";
      var badgeText = item.gap === null ? "neu" : item.gap === 0 ? "heute" : item.gap + " Tg.";
      var sub = item.last ? "Zuletzt am " + fmtDate(item.last) : "Noch nie gemacht";
      return (
        '<button class="card tight" data-suggest-ex="' + item.ex.id + '" style="width:100%;text-align:left;border:1px solid var(--hairline);cursor:pointer;font:inherit;color:inherit;margin:0;background:var(--surface);">' +
        '<div style="flex:1;min-width:0;"><div class="session-title">' + esc(item.ex.name) + "</div>" +
        '<div style="color:var(--muted);font-size:11px;margin-top:2px;">' + esc(item.ex.category) + " · " + sub + "</div></div>" +
        '<span class="gap-badge" style="color:' + badgeColor + ';">' + badgeText + "</span>" +
        '<span class="chevron" style="margin-left:6px;">›</span>' +
        "</button>"
      );
    }).join("");

    var otherActivityMeta = [{ type: "novafon", icon: "〰️", label: "Novafon", emptyText: "Noch keine Novafon-Einheit erfasst" }]
      .concat(SIMPLE_TYPES.map(function (cfg) {
        return { type: cfg.type, icon: cfg.icon, label: cfg.label, emptyText: "Noch keine " + cfg.label + "-Einheit erfasst" };
      }));
    var otherActivityCards = otherActivityMeta
      .filter(function (m) { return relevantSessions.some(function (s) { return s.type === m.type; }); })
      .map(function (m) {
        var list = relevantSessions.filter(function (s) { return s.type === m.type; }).sort(function (a, b) { return a.date < b.date ? 1 : -1; });
        var last = list[0];
        return (
          '<div class="card tight"><span style="font-size:16px;">' + m.icon + '</span><div style="flex:1;font-size:14px;">' +
          (last ? "Zuletzt " + fmtDate(last.date) + " (" + last.duration + " Min.)" : m.emptyText) + "</div></div>"
        );
      }).join("");

    return (
      dogChips +
      '<div style="margin-bottom:20px;"><div class="section-label">Vorschlag für heute</div>' +
      '<div style="display:flex;flex-direction:column;gap:8px;">' + suggestionCards + "</div>" +
      '<p style="color:var(--muted);font-size:11px;margin-top:8px;">Antippen bringt dich direkt zum Eintragen mit vorausgewählter Übung. ' +
      "Pro Kategorie wird die am längsten fällige Übung vorgeschlagen, damit keine Kategorie untergeht.</p></div>" +
      (otherActivityCards ? '<div style="margin-bottom:20px;"><div class="section-label">Weitere Aktivitäten</div>' +
      '<div style="display:flex;flex-direction:column;gap:8px;">' + otherActivityCards + "</div></div>" : "") +
      '<div class="card info-box"><span>ℹ️</span><p>Diese Vorschläge basieren nur auf zeitlichem Abstand — sie ersetzen nicht den Übungsplan deiner Physio. ' +
      "Auswahl, Reihenfolge und Steigerung der Übungen richten sich weiter nach deren Vorgaben.</p></div>"
    );
  }

        '<label class="field"><span class="field-label">Kategorie</span><input id="lib-category" list="lib-category-list" placeholder="Bestehende wählen oder neue eingeben" value="' + (editingEx ? esc(editingEx.category) : "") + '" /><datalist id="lib-category-list">' + catOptions + '</datalist></label>' +
        '<label class="field"><span class="field-label">Schwierigkeitsgrad</span><select id="lib-difficulty">' + diffOptions + '</select></label>' +
        '<label class="field"><span class="field-label">Quelle (optional)</span><input id="lib-source" list="lib-source-list" placeholder="z. B. Physiotherapeut:in oder Programmname" value="' + (editingEx ? esc(editingEx.source || "") : "") + '" /><datalist id="lib-source-list">' + srcOptions + '</datalist></label>' +

        var notesHTML = e.notes ? '<div class="session-notes" style="margin-top:6px;">' + esc(e.notes) + "</div>" : "";
        return (
          '<div class="card" style="padding:12px 14px;margin-bottom:0;">' +
          '<div style="display:flex;align-items:flex-start;gap:10px;">' +

          '<div style="color:var(--muted);font-size:11px;margin-top:2px;">' + (e.source ? esc(e.source) + " · " : "") + esc(e.difficulty || "Beginner") + "</div>" +
          notesHTML + "</div>" +
          '<button class="icon-btn" data-edit-ex="' + e.id + '" style="font-size:15px;">✏️</button>' +

        (isOpen ? '<div style="display:flex;flex-direction:column;gap:8px;">' + items + "</div>" : "") +

  function showImportLibraryModal() {
    var overlay = document.getElementById("text-modal-overlay");
    overlay.innerHTML =
      '<div class="text-modal">' +
      '<div class="form-header"><span class="display" style="font-weight:600;">Übungen einfügen</span><button class="icon-btn" id="close-import-lib-modal-x">✕</button></div>' +
      '<textarea id="import-lib-modal-content" placeholder="Übungsbibliothek-Text hier einfügen (von einer anderen Person kopiert)"></textarea>' +
      '<button class="btn-primary" id="import-lib-modal-submit" style="margin-top:10px;">Zur eigenen Bibliothek hinzufügen</button>' +
      "</div>";
    overlay.style.display = "flex";
    var ta = document.getElementById("import-lib-modal-content");
    ta.focus();
    function close() { overlay.style.display = "none"; overlay.innerHTML = ""; overlay.dataset.mode = ""; }
    document.getElementById("close-import-lib-modal-x").addEventListener("click", close);
    document.getElementById("import-lib-modal-submit").addEventListener("click", function () {
      try {
        var parsed = JSON.parse(ta.value);
        if (!parsed.exercises || !Array.isArray(parsed.exercises)) throw new Error("Ungültiges Format");
        var existingNames = state.exercises.map(function (e) { return e.name.trim().toLowerCase(); });
        var added = 0, skipped = 0;
        parsed.exercises.forEach(function (e) {
          if (!e.name) return;
          var key = e.name.trim().toLowerCase();
          if (existingNames.indexOf(key) !== -1) { skipped++; return; }
          state.exercises.push({
            id: uid(),
            name: e.name,
            category: e.category || "Sonstiges",
            difficulty: e.difficulty || "Beginner",
            source: e.source || "",
            notes: e.notes || ""
          });
          existingNames.push(key);
          added++;
        });
        saveData();
        close();
        toast(added + " Übung(en) hinzugefügt" + (skipped ? ", " + skipped + " bereits vorhanden übersprungen" : ""));
        render();
        refreshAdminModalIfOpen();
      } catch (e) {
        toast("Import fehlgeschlagen: Text ist keine gültige Übungsbibliothek");
      }
    });
  }

    if (showImportLibraryPasteBtn) showImportLibraryPasteBtn.addEventListener("click", showImportLibraryModal);
  }

  function attachHandlers() {
    document.querySelectorAll(".choice-btn").forEach(function (btn) {
      btn.addEventListener("click", function () { logMode = btn.dataset.mode; render(); });
    });
    var cancelBtn = document.getElementById("cancelForm");
    if (cancelBtn) cancelBtn.addEventListener("click", function () { logMode = null; logPreselectId = null; render(); });

    document.querySelectorAll("[data-suggest-ex]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        logPreselectId = btn.dataset.suggestEx;
        currentTab = "log";
        logMode = "exercise";
        render();
      });
    });

    document.querySelectorAll(".ex-check").forEach(function (cb) {
      cb.addEventListener("change", function () {
        var repsInput = document.querySelector('.ex-reps[data-id="' + cb.dataset.id + '"]');
        if (repsInput) repsInput.style.display = cb.checked ? "block" : "none";
        if (typeof checkValid === "function") checkValid();
      });
    });

    var exSearch = document.getElementById("ex-search");
    if (exSearch) {
      exSearch.addEventListener("input", function () {
        var term = exSearch.value.trim().toLowerCase();
        var rows = document.querySelectorAll(".ex-row");
        var anyVisible = false;
        rows.forEach(function (row) {
          var match = term === "" || row.dataset.search.indexOf(term) !== -1;
          row.style.display = match ? "flex" : "none";
          if (match) anyVisible = true;
        });
        var noResults = document.getElementById("ex-no-results");
        if (noResults) noResults.style.display = anyVisible ? "none" : "block";
      });
    }

    var submitBtn = document.getElementById("submitForm");
    var checkValid;
    if (submitBtn) {
      checkValid = function () {
        if (logMode === "exercise") {
          var checked = Array.prototype.filter.call(document.querySelectorAll(".ex-check"), function (cb) { return cb.checked; });
          submitBtn.disabled = checked.length === 0;
        } else if (logMode === "custom") {
          var act = document.getElementById("f-activity");
          submitBtn.disabled = !(act && act.value.trim() !== "");
        } else {
          var dur = document.getElementById("f-duration");
          submitBtn.disabled = !(dur && dur.value !== "");
        }
      };
      main_inputs_listen(checkValid);
      checkValid();

      if (logMode === "exercise" && logPreselectId) {
        var preCb = document.querySelector('.ex-check[data-id="' + logPreselectId + '"]');
        if (preCb) {
          preCb.checked = true;
          preCb.dispatchEvent(new Event("change"));
          var preReps = document.querySelector('.ex-reps[data-id="' + logPreselectId + '"]');
          if (preReps) preReps.focus();
        }
        logPreselectId = null;
      }

      submitBtn.addEventListener("click", function () {
        var date = document.getElementById("f-date").value || todayISO();
        var notes = document.getElementById("f-notes").value.trim();
        var dogSelect = document.getElementById("f-dog");
        var dogId = dogSelect ? dogSelect.value : (state.dogs.length === 1 ? state.dogs[0].id : null);
        if (logMode === "exercise") {
          var checked = Array.prototype.filter.call(document.querySelectorAll(".ex-check"), function (cb) { return cb.checked; });
          checked.forEach(function (cb) {
            var ex = state.exercises.find(function (e) { return e.id === cb.dataset.id; });
            var repsInput = document.querySelector('.ex-reps[data-id="' + cb.dataset.id + '"]');
            var repsVal = repsInput.value.trim();
            state.sessions.unshift({ id: uid(), type: "exercise", date: date, dogId: dogId, exerciseId: ex.id, category: ex.category, difficulty: ex.difficulty || "Beginner", exerciseName: ex.name, reps: repsVal === "" ? null : Number(repsVal), notes: notes });
          });
          saveData();
          toast(checked.length > 1 ? checked.length + " Übungen gespeichert" : "Eintrag gespeichert");
        } else {
          var entry;
          if (logMode === "novafon") {
            entry = { id: uid(), type: "novafon", date: date, dogId: dogId, area: document.getElementById("f-area").value, duration: Number(document.getElementById("f-duration").value), notes: notes };
          } else if (logMode === "custom") {
            var actVal = document.getElementById("f-activity").value.trim();
            var durVal = document.getElementById("f-duration").value;
            entry = { id: uid(), type: "custom", date: date, dogId: dogId, activityName: actVal, duration: durVal === "" ? null : Number(durVal), notes: notes };
          } else {
            var simpleCfg = simpleTypeConfig(logMode);
            var distField = simpleCfg && simpleCfg.hasDistance ? document.getElementById("f-distance") : null;
            entry = { id: uid(), type: logMode, date: date, dogId: dogId, duration: Number(document.getElementById("f-duration").value), notes: notes };
            if (distField) entry.distance = distField.value === "" ? null : Number(distField.value);
          }
          state.sessions.unshift(entry);
          saveData();
          toast("Eintrag gespeichert");
        }
        logMode = null;
        render();
      });
    }

    document.querySelectorAll(".filter-chip").forEach(function (chip) {
      chip.addEventListener("click", function () {
        if (chip.dataset.filter !== undefined) historyFilter = chip.dataset.filter;
        else if (chip.dataset.dogFilter !== undefined) { activeDogFilter = chip.dataset.dogFilter; calendarSelectedDay = null; }
        render();
      });
    });
    var historyViewSelect = document.getElementById("history-view-select");
    if (historyViewSelect) historyViewSelect.addEventListener("change", function () { historyView = historyViewSelect.value; calendarSelectedDay = null; render(); });
    var historyDogSelect = document.getElementById("history-dog-select");
    if (historyDogSelect) historyDogSelect.addEventListener("change", function () { activeDogFilter = historyDogSelect.value; calendarSelectedDay = null; render(); });
    var statsDogSelect = document.getElementById("stats-dog-select");
    if (statsDogSelect) statsDogSelect.addEventListener("change", function () { activeDogFilter = statsDogSelect.value; render(); });
    var statsPeriodSelect = document.getElementById("stats-period-select");
    if (statsPeriodSelect) statsPeriodSelect.addEventListener("change", function () { statsPeriod = statsPeriodSelect.value; render(); });
    var statsGroupbySelect = document.getElementById("stats-groupby-select");
    if (statsGroupbySelect) statsGroupbySelect.addEventListener("change", function () { statsGroupBy = statsGroupbySelect.value; render(); });
    var statsSortorderSelect = document.getElementById("stats-sortorder-select");
    if (statsSortorderSelect) statsSortorderSelect.addEventListener("change", function () { statsSortOrder = statsSortorderSelect.value; render(); });
    document.querySelectorAll("[data-cal-nav]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var parts = calendarMonth.split("-");
        var year = Number(parts[0]), month = Number(parts[1]) - 1;
        month += btn.dataset.calNav === "next" ? 1 : -1;
        var d = new Date(year, month, 1);
        calendarMonth = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
        render();
      });
    });
    document.querySelectorAll("[data-cal-day]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        calendarSelectedDay = btn.dataset.calDay;
        render();
      });
    });
    var calBackBtn = document.getElementById("cal-back-btn");
    if (calBackBtn) calBackBtn.addEventListener("click", function () { calendarSelectedDay = null; render(); });
    var statsFrom = document.getElementById("stats-from");
    var statsTo = document.getElementById("stats-to");
    if (statsFrom) statsFrom.addEventListener("change", function () { statsCustomFrom = statsFrom.value; render(); });
    if (statsTo) statsTo.addEventListener("change", function () { statsCustomTo = statsTo.value; render(); });
    document.querySelectorAll("[data-delete]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        state.sessions = state.sessions.filter(function (s) { return s.id !== btn.dataset.delete; });
        saveData(); render();
      });
    });

    var openLib = document.getElementById("openLibForm");
    if (openLib) openLib.addEventListener("click", function () { libraryFormOpen = true; libraryEditingId = null; render(); });
    var cancelLib = document.getElementById("cancelLibForm");
    if (cancelLib) cancelLib.addEventListener("click", function () { libraryFormOpen = false; libraryEditingId = null; render(); });
    document.querySelectorAll("[data-toggle-cat]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var cat = btn.dataset.toggleCat;
        expandedCategories[cat] = !expandedCategories[cat];
        render();
      });
    });
    document.querySelectorAll("[data-edit-ex]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        libraryEditingId = btn.dataset.editEx;
        libraryFormOpen = true;
        render();
      });
    });
    var libName = document.getElementById("lib-name");
    var libCategory = document.getElementById("lib-category");
    var libDifficulty = document.getElementById("lib-difficulty");
    var libSource = document.getElementById("lib-source");
    var libNotes = document.getElementById("lib-notes");
    var libSubmit = document.getElementById("lib-submit");
    if (libName && libCategory && libSource && libSubmit) {
      var checkLibValid = function () {
        libSubmit.disabled = libName.value.trim() === "" || libCategory.value.trim() === "";
      };
      libName.addEventListener("input", checkLibValid);
      libCategory.addEventListener("input", checkLibValid);
      libSubmit.addEventListener("click", function () {
        if (!libName.value.trim() || !libCategory.value.trim()) return;
        var newName = libName.value.trim();
        var newCategory = libCategory.value.trim();
        var newDifficulty = libDifficulty ? libDifficulty.value : "Beginner";
        var newSource = libSource.value.trim();
        var newNotes = libNotes ? libNotes.value.trim() : "";
        expandedCategories[newCategory] = true;

        if (libraryEditingId) {
          var ex = state.exercises.find(function (e) { return e.id === libraryEditingId; });
          if (ex) {
            ex.name = newName; ex.category = newCategory; ex.difficulty = newDifficulty; ex.source = newSource; ex.notes = newNotes;
            // bereits geloggte Sessions dieser Übung auf den aktuellen Stand bringen (Name/Kategorie/Schwierigkeitsgrad),
            // damit Verlauf und Statistik konsistent bleiben — Wiederholungen/Datum/Session-Notizen bleiben unverändert
            state.sessions.forEach(function (s) {
              if (s.type === "exercise" && s.exerciseId === libraryEditingId) {
                s.exerciseName = newName; s.category = newCategory; s.difficulty = newDifficulty;
              }
            });
          }
          toast("Änderungen gespeichert");
        } else {
          state.exercises.push({ id: uid(), name: newName, category: newCategory, difficulty: newDifficulty, source: newSource, notes: newNotes });
          toast("Übung gespeichert");
        }
        saveData();
        libraryFormOpen = false;
        libraryEditingId = null;
        render();
      });
    }
    document.querySelectorAll("[data-delete-ex]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        state.exercises = state.exercises.filter(function (e) { return e.id !== btn.dataset.deleteEx; });
        saveData(); render();
      });
    });
  }

  function main_inputs_listen(fn) {
    document.querySelectorAll("#main input, #main select").forEach(function (el) {
      el.addEventListener("input", fn);
      el.addEventListener("change", fn);
    });
  }

  function renderTitleDisplay() {
    var c = document.getElementById("title-container");
    var name = state.appName || "Physio-Log";
    c.innerHTML =
      '<h1 id="app-title" style="min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;" title="Antippen, um den Namen zu ändern">' + esc(name) + "</h1>";
    document.getElementById("app-title").addEventListener("click", renderTitleEdit);
    document.title = name;
  }

  function renderTitleEdit() {
    var c = document.getElementById("title-container");
    var current = state.appName || "Physio-Log";
    c.innerHTML =
      '<input type="text" id="app-title-input" value="' + esc(current) + '" ' +
      'style="background:var(--surface2);border:1px solid var(--accent);color:var(--text);border-radius:8px;padding:6px 10px;font-size:17px;width:100%;font-family:inherit;" />';
    var input = document.getElementById("app-title-input");
    input.focus();
    input.select();
    var committed = false;
    function commit() {
      if (committed) return;
      committed = true;
      var val = input.value.trim();
      state.appName = val !== "" ? val : (state.appName || "Physio-Log");
      saveData();
      renderTitleDisplay();
    }
    input.addEventListener("blur", commit);
    input.addEventListener("keydown", function (e) {
      if (e.key === "Enter") { e.preventDefault(); commit(); }
      else if (e.key === "Escape") { committed = true; renderTitleDisplay(); }
    });
  }

  document.querySelectorAll(".nav-btn").forEach(function (btn) {
    btn.addEventListener("click", function () {
      currentTab = btn.dataset.tab;
      logMode = null;
      libraryFormOpen = false;
      libraryEditingId = null;
      render();
    });
  });

  document.getElementById("open-admin-modal").addEventListener("click", renderAdminModal);

  if (state.bgColor) applyBgColor(state.bgColor);

  renderTitleDisplay();
  render();
  if (shouldShowBackupReminder()) showBackupReminderModal();
})();
</script>
</body>
</html>
